<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Сравнение моделей — VENTSEARCH</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css?v=20260502-3" />
  </head>
  <body data-page="compare">
    <nav class="navbar navbar-expand-lg sticky-top">
      <div class="container-fluid px-3 px-lg-4">
        <a class="navbar-brand fw-semibold" href="index.html">VENTSEARCH</a>
        <div class="ms-auto d-flex gap-2">
          <a class="btn btn-outline-dark btn-sm" href="index.html">← В каталог</a>
        </div>
      </div>
    </nav>

    <main class="container-fluid px-3 px-lg-4 py-4">
      <div id="alertBox" class="alert alert-danger d-none mb-3" role="alert"></div>

      <div class="export-bar">
        <div>
          <div class="fw-semibold">Сравнение моделей</div>
          <p id="compareMeta" class="mb-0">Выберите модели в каталоге и возвращайтесь сюда.</p>
        </div>
        <div class="d-flex gap-2">
          <button id="clearCompareBtn" class="btn btn-outline-dark btn-sm" type="button">Очистить</button>
          <button id="exportPdfBtn" class="btn btn-dark btn-sm" type="button">Экспорт в PDF</button>
        </div>
      </div>

      <div class="chart-container">
        <div class="chart-title">График Q–P</div>
        <div class="chart-canvas-wrap">
          <canvas id="qpChart"></canvas>
        </div>
      </div>

      <div class="chart-container">
        <div class="chart-title">Таблица характеристик</div>
        <div class="table-responsive">
          <table class="table compare-table mb-0">
            <thead id="compareTableHead"></thead>
            <tbody id="compareTableBody"></tbody>
          </table>
        </div>
        <div class="small text-secondary mt-2">Зелёным отмечены лучшие показатели.</div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="config.js?v=20260424-1"></script>
    <script src="script.js?v=20260502-5"></script>
  </body>
</html>
