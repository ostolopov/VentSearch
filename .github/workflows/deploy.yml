on:
  push:
    branches: [ baranovegor ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Yandex Container Registry
        uses: yc-actions/yc-cr-login@v1
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_KEY }}

      - name: Build and Push Docker Image
        run: |
          docker build -t cr.yandex/${{ secrets.REGISTRY_ID }}/ventsearch-api:${{ github.sha }} -f Dockerfile .
          docker push cr.yandex/${{ secrets.REGISTRY_ID }}/ventsearch-api:${{ github.sha }}

      - name: Deploy via CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -n -i /home/runner/yandex-cloud
          export PATH=$PATH:/home/runner/yandex-cloud/bin
          
          echo '${{ secrets.YC_SA_JSON_KEY }}' > key.json
          yc config profile create sa-profile
          yc config set service-account-key key.json
          yc config set folder-id ${{ secrets.FOLDER_ID }}
          
          # Явно указываем аккаунт и для yc, и для самого контейнера
          yc serverless container revision deploy \
            --container-name ventsearch-api \
            --image cr.yandex/${{ secrets.REGISTRY_ID }}/ventsearch-api:${{ github.sha }} \
            --cores 1 \
            --memory 512m \
            --concurrency 8 \
            --service-account-id ${{ secrets.SA_ID }}