name: Deploy VentSearch

on:
  push:
    branches: [ baranovegor ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 1. Авторизация в Yandex Container Registry
      - name: Login to Yandex Container Registry
        uses: yc-actions/yc-cr-login@v1
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_KEY }}

      # 2. Сборка Docker-образа и отправка в облако
      # Используем SHA коммита как тег, чтобы каждая версия была уникальной
      - name: Build and Push Docker Image
        run: |
          docker build -t cr.yandex/${{ secrets.REGISTRY_ID }}/ventsearch-api:${{ github.sha }} -f Dockerfile .
          docker push cr.yandex/${{ secrets.REGISTRY_ID }}/ventsearch-api:${{ github.sha }}

      # 3. Обновление Serverless Container
      # Используем официальный проверенный экшен
      - name: Deploy Serverless Container
        uses: yandex-cloud/deploy-container@v1
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_KEY }}
          container-name: ventsearch-api
          folder-id: ${{ secrets.FOLDER_ID }}
          revision-image: cr.yandex/${{ secrets.REGISTRY_ID }}/ventsearch-api:${{ github.sha }}
          revision-cores: 1
          revision-memory: 512Mi
          revision-concurrency: 8
          revision-service-account-id: ${{ secrets.SA_ID }}