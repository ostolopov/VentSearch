server {
    listen 80;
    # Прод-домены: ventsearch.ru, ventsearch.online (и www — по желанию).
    server_name ventsearch.ru www.ventsearch.ru ventsearch.online www.ventsearch.online;

    # Временная отладка по IP без домена — раскомментируйте вместо строки выше:
    # server_name _;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
