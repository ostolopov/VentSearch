# Скопируйте на ВМ в /etc/nginx/sites-available/ventsearch.conf
# Файлы: /etc/nginx/ssl/ventsearch.fullchain.crt (лист + промежуточный PEM подряд)
#         /etc/nginx/ssl/ventsearch.key (приватный ключ, chmod 600)
# Включение: sudo ln -sf /etc/nginx/sites-available/ventsearch.conf /etc/nginx/sites-enabled/
# Проверка: sudo nginx -t && sudo systemctl reload nginx
#
# server_name должен совпадать с именами в вашем SSL-сертификате (SAN).
# Если .online нет в сертификате — уберите ventsearch.online www.ventsearch.online из обоих server.

# HTTP → HTTPS
server {
    listen 80;
    server_name ventsearch.ru www.ventsearch.ru ventsearch.online www.ventsearch.online;

    return 301 https://$host$request_uri;
}

# HTTPS → бэкенд (Docker / приложение на 127.0.0.1:8080)
server {
    listen 443 ssl http2;
    server_name ventsearch.ru www.ventsearch.ru ventsearch.online www.ventsearch.online;

    ssl_certificate     /etc/nginx/ssl/ventsearch.fullchain.crt;
    ssl_certificate_key /etc/nginx/ssl/ventsearch.key;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
